name: Build and Publish Plugin

on:
  workflow_call:
    inputs:
      slug:
        required: true
        type: string
      version:
        required: true
        type: string
      release_notes:
        required: true
        type: string
      plugin_file:
        required: true
        type: string
      build:
        description: "Whether to run the build step (make ci). Set to false if assets are already committed."
        required: false
        type: boolean
        default: true
      dist_repo:
        description: "Optional: SSH URL of a distribution repository to push built files to (e.g. git@github.com:org/repo-dist.git)"
        required: false
        type: string
    secrets:
      UPDATE_API_KEY:
        required: true
      DIST_REPO_SSH_KEY:
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. Checkout the tag created by foonver
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      # 2. Setup Environments
      - uses: actions/setup-node@v4
        if: ${{ inputs.build }}
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        if: ${{ inputs.build }}
        with:
          version: "11"
      - uses: shivammathur/setup-php@v2
        if: ${{ inputs.build }}
        with:
          php-version: "8.2"
          tools: composer

      # 3. Build Assets and Zip
      - name: Build
        if: ${{ inputs.build }}
        run: make ci
      - name: Zip
        run: |
          mkdir -p release
          if [ -f .zipexclude ]; then
            zip -r release/${{ inputs.slug }}.zip . -x@.zipexclude
          elif [ -f zip_exclude.txt ]; then
            zip -r release/${{ inputs.slug }}.zip . -x@zip_exclude.txt
          else
            zip -r release/${{ inputs.slug }}.zip . -x "release/*" ".git/*" ".github/*"
          fi

      # 4. Extract metadata from the PHP file
      - name: Extract metadata
        id: metadata
        run: |
          echo "requires_wp=$(grep "Requires at least:" ${{ inputs.plugin_file }} | cut -d: -f2 | xargs)" >> $GITHUB_OUTPUT
          echo "tested_wp=$(grep "Tested up to:" ${{ inputs.plugin_file }} | cut -d: -f2 | xargs)" >> $GITHUB_OUTPUT
          echo "requires_php=$(grep "Requires PHP:" ${{ inputs.plugin_file }} | cut -d: -f2 | xargs)" >> $GITHUB_OUTPUT

      # 5. Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Release ${{ inputs.version }}
          body: ${{ inputs.release_notes }}
          files: release/${{ inputs.slug }}.zip

      # 6. Notify Update API
      - name: Publish to Update API
        env:
          UPDATE_API_KEY: ${{ secrets.UPDATE_API_KEY }}
        run: |
          curl -i -X POST https://update.jcore.fi/v1/versions \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $UPDATE_API_KEY" \
            -d '{
              "slug": "${{ inputs.slug }}",
              "version": "${{ inputs.version }}",
              "download_url": "https://github.com/${{ github.repository }}/releases/download/v${{ inputs.version }}/${{ inputs.slug }}.zip",
              "changelog": ${{ toJson(inputs.release_notes) }},
              "requires_wp": "${{ steps.metadata.outputs.requires_wp }}",
              "tested_wp": "${{ steps.metadata.outputs.tested_wp }}",
              "requires_php": "${{ steps.metadata.outputs.requires_php }}"
            }'

      # 7. Publish to Dist Repo (Optional)
      - name: Publish to Dist Repo
        if: ${{ inputs.dist_repo != '' && secrets.DIST_REPO_SSH_KEY != '' }}
        shell: bash
        env:
          DIST_REPO: ${{ inputs.dist_repo }}
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        run: |
          # Setup SSH
          ssh-agent -a $SSH_AUTH_SOCK > /dev/null
          ssh-add - <<< "${{ secrets.DIST_REPO_SSH_KEY }}"
          mkdir -p ~/.ssh
          # Extract hostname for keyscan
          HOSTNAME=$(echo $DIST_REPO | sed -E 's/.*@([^:/]+).*/\1/; s/([^:/]+):.*/\1/')
          ssh-keyscan -H "$HOSTNAME" >> ~/.ssh/known_hosts

          # Clone dist repo
          git clone "$DIST_REPO" dist_repo_clone

          # Sync files
          # We use rsync to copy everything except .git and other internal folders
          # This ensures the dist repo is a clean mirror of the built project
          rsync -av --delete ./ dist_repo_clone/ \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'dist_repo_clone/' \
            --exclude 'release/'

          cd dist_repo_clone

          # Handle dist-specific gitignore
          # If .distignore exists, it becomes the .gitignore for the dist repo
          if [ -f .distignore ]; then
            mv .distignore .gitignore
          fi

          # Commit, Tag and Push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Release v${{ inputs.version }}"
            git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
            git push origin main
            git push origin "v${{ inputs.version }}"
          fi
